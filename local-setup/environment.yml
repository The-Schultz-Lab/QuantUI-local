name: quantui
channels:
  - conda-forge
  - defaults

dependencies:
  # Python version
  - python=3.11

  # Core Jupyter and widgets
  - jupyter>=1.0.0
  - ipywidgets>=8.0.0
  - notebook>=7.0.0
  - ipykernel>=6.0.0

  # Scientific computing
  - numpy>=1.24.0
  - ase>=3.22.0          # Structure I/O, molecule library, geometry optimisation
  - rdkit>=2022.03.1     # PubChem SDF→XYZ conversion, SMILES input

  # Visualization
  - py3dmol>=2.0.0       # Primary 3D molecular viewer
  - matplotlib>=3.7.0
  - plotly>=5.0.0        # Orbital diagrams and comparison plots

  # Web APIs (PubChem integration)
  - requests>=2.28.0

  # Testing and development
  - pytest>=7.0.0
  - pytest-cov>=4.0.0
  - pytest-mock>=3.10.0
  - mypy>=1.0.0
  - nbstripout>=0.7.0    # Strip notebook outputs before git commits
  - pre-commit>=3.0.0

  # Package manager for pip dependencies
  - pip>=23.0

  - pip:
      # Voilà app server — clean widget-only UI for classroom demos
      - voila>=0.5.0
      # Notebook smoke testing
      - nbmake>=1.4.0
      # Code formatting and linting (not on conda-forge)
      - black>=24.0.0
      - ruff>=0.4.0
      # Install QuantUI in editable mode
      # On Linux/WSL also run: conda install -c conda-forge pyscf
      # (pyscf-properties is pip-only; installed here automatically)
      - pyscf-properties   # NMR and other properties (pyscf.prop); moved out of pyscf core in v2.0
      - -e ..
