name: quantui-local
channels:
  - conda-forge
  - defaults

dependencies:
  # Python version
  - python=3.11

  # Core Jupyter and widgets
  - jupyter>=1.0.0
  - ipywidgets>=8.0.0
  - notebook>=7.0.0
  - ipykernel>=6.0.0

  # Quantum chemistry
  # NOTE: PySCF requires Linux/macOS/WSL. Windows users should use the
  # Apptainer container instead: apptainer run quantui-local.sif
  - pyscf>=2.3.0  # [not win]

  # Scientific computing
  - numpy>=1.24.0
  - ase>=3.22.0          # Structure I/O, molecule library, geometry optimisation

  # Visualization
  - py3dmol>=2.0.0       # Primary 3D molecular viewer
  - matplotlib>=3.7.0
  - plotly>=5.0.0        # Orbital diagrams and comparison plots

  # Web APIs (PubChem integration)
  - requests>=2.28.0

  # Testing and development
  - pytest>=7.0.0
  - pytest-cov>=4.0.0
  - pytest-mock>=3.10.0
  - mypy>=1.0.0
  - nbstripout>=0.7.0    # Strip notebook outputs before git commits
  - pre-commit>=3.0.0

  # Package manager for pip dependencies
  - pip>=23.0

  - pip:
      # Voilà app server — clean widget-only UI for classroom demos
      - voila>=0.5.0
      # Notebook smoke testing
      - nbmake>=1.4.0
      # Install QuantUI-local in editable mode
      - -e .
